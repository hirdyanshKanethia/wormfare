name: Keep Supabase & Backend Alive

on:
  schedule:
    # Run once every day at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Leaderboard API
        run: |
          echo "Pinging the backend to hit the database..."
          curl -sS https://wormfare-backend.onrender.com/api/leaderboard > /dev/null
          echo "Ping complete."
